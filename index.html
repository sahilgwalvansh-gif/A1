<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
     <div class="page">
 
   
    <div class="bg-text">GAME</div>
 
   
    <div class="scroll-indicator">SCROLL</div>
    <div class="scroll-line"></div>
 
    
    <div class="social-icons">
      <div class="social-icon">𝕏</div>
      <div class="social-icon">◎</div>
      <div class="social-icon">f</div>
    </div>
 
   
    <div class="side-text">SQUID GAME</div>
 
   
    <nav class="navbar">
      <!-- Logo -->
      <div class="nav-logo">
        <span class="logo-squid">SQUID</span>
        <span class="logo-game">GAME<span style="color:#e91e8c;font-size:16px;">+</span></span>
      </div>
 
     
      <ul class="nav-links">
        <li><a href="#">About</a></li>
        <li><a href="#" class="active">Watch now</a></li>
        <li><a href="#">Actors</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
 

      <div class="nav-menu">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </nav>
 

    <section class="hero">
 

      <div class="hero-left">
 

        <div class="shape-cyan"></div>
        <div class="shape-yellow"></div>
 
        <h1 class="hero-title">
          SQUID<br>
          GAM<span class="pink">E</span>
        </h1>
 
        <p class="hero-desc">
          Action / Thriller / Drama Series directed by Dong-hyuk Hwang<br>
          Season 1: 9 Episodes
        </p>
 

        <div class="hero-btns">
          <button class="btn-play">
            <div class="play-circle">▶</div>
            Play Now
          </button>
          <button class="btn-trailer">
            ▷ &nbsp;Watch Trailer
          </button>
        </div>
      </div>
 

      <div class="hero-right">

        <div class="hero-glow"></div>
 
        <img
          class="hero-character"
          src="./download (1).png"
          alt="Squid Game character in pink suit"
        />
      </div>
 
    </section>
 

    <div class="video-section">
      <div class="video-row">
 

        <div class="video-card">
          <img src="./eb4f466d68c5b1f148876774d32545f8.jpg" alt="Squid Game episode 1"/>
          <div class="video-overlay"></div>

          <div class="video-title">
            <div class="series-label">SERIES</div>
            <div class="series-name">SQUID <span class="pink">GAME</span></div>
          </div>
    
          <div class="play-btn">▶</div>
        </div>
 

        <div class="video-card">
          <img src="./49e4d6d6516b6a010e91e77d9dbe7991.jpg" alt="Squid Game episode 2"/>
          <div class="video-overlay"></div>
          <div class="play-btn">▶</div>
        </div>
 

        <div class="video-card">
          <img src="./b9c1715a78be7f83dd1d0c076c901e18.jpg" alt="Squid Game episode 3"/>
          <div class="video-overlay"></div>
          <div class="play-btn">▶</div>
        </div>
 
      </div>
    </div>
 
  </div>
</body>
</html>
